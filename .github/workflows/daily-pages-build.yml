name: Daily Cloudflare Pages Build

on:
  schedule:
    # 00:10 UTC = 09:10 Japan time. Adjust this if you want a different publish hour.
    - cron: "10 0 * * *"
  workflow_dispatch:

jobs:
  trigger-cloudflare-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages deploy hook
        if: ${{ secrets.CF_PAGES_DEPLOY_HOOK != '' }}
        run: |
          curl -X POST "${{ secrets.CF_PAGES_DEPLOY_HOOK }}"

      - name: Missing deploy hook help
        if: ${{ secrets.CF_PAGES_DEPLOY_HOOK == '' }}
        run: |
          echo "Add a GitHub Actions secret named CF_PAGES_DEPLOY_HOOK."
          echo "Create the hook in Cloudflare Pages: Project > Settings > Builds & deployments > Deploy hooks."
